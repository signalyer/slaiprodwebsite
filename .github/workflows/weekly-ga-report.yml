name: Weekly GA4 Report

on:
  schedule:
    # Monday 13:00 UTC = 8:00 AM Central Time
    - cron: '0 13 * * 1'
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate report
        id: generate
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: python scripts/ga-weekly-report.py

      - name: Commit report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly GA4 report — ${{ steps.generate.outputs.report_date }}"
            git push
          fi

      - name: Create issue with report body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Weekly GA4 Report — ${{ steps.generate.outputs.report_date }}" \
            --body-file "${{ steps.generate.outputs.report_file }}" \
            --label "analytics" || \
          gh issue create \
            --title "Weekly GA4 Report — ${{ steps.generate.outputs.report_date }}" \
            --body-file "${{ steps.generate.outputs.report_file }}"
